<!DOCTYPE html>

<html>
<head>

<title>Submitted Lost Items</title>

<style>

body{
font-family:Arial;
background:#a9bdd6;
padding:40px;
}

h1{
text-align:center;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:40px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
width:260px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.back{
display:block;
margin:30px auto;
width:200px;
text-align:center;
padding:10px;
background:#2f66e0;
color:white;
border-radius:6px;
text-decoration:none;
}

</style>

</head>

<body>

<h1>Submitted Lost Items</h1>

<div class="container" id="lostList"></div>

<a class="back" href="dashboard321.html">Back to Dashboard</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain:"intellifinds-19f97.firebaseapp.com",
projectId:"intellifinds-19f97",
storageBucket:"intellifinds-19f97.appspot.com",
messagingSenderId:"910756623728",
appId:"1:910756623728:web:8ab55db46a984c75860bb5",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list=document.getElementById("lostList");

onValue(ref(db,"lostItems"),(snapshot)=>{

list.innerHTML="";

snapshot.forEach(child=>{

const data=child.val();

list.innerHTML+=`

<div class="card">

<img src="${data.photo || ''}">

<p><b>Item:</b> ${data.item}</p>
<p><b>Description:</b> ${data.description}</p>
<p><b>Location:</b> ${data.location}</p>

</div>

`;

});

});

</script>

</body>
</html>
