<!DOCTYPE html>
<html>
<head>
  <title>View Lost Items</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 15px auto;
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>Lost Items</h2>
<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔥 MAIN FUNCTION (FIXED)
async function loadLostItems() {
  const list = document.getElementById("list");

  try {
    const snapshot = await getDocs(collection(db, "lostItems"));

    if (snapshot.empty) {
      list.innerHTML = "<p>No lost items found</p>";
      return;
    }

    snapshot.forEach((doc) => {
      const data = doc.data();

      list.innerHTML += `
        <div class="card">
          <h3>${data.title || "No Title"}</h3>
          <p>${data.description || "No Description"}</p>
          <p><b>Location:</b> ${data.location || "No Location"}</p>
          <p style="color:orange;"><b>Personal details hidden</b></p>
        </div>
      `;
    });

  } catch (error) {
    console.error("Error loading data:", error);
    list.innerHTML = "<p>Error loading data. Check console.</p>";
  }
}

// 🔥 CALL FUNCTION
loadLostItems();

</script>

</body>
</html>
