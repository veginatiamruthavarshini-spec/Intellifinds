<!DOCTYPE html>
<html>
<head>

<title>Lost Items</title>

<style>

body{
font-family:Arial;
background:#a9bdd6;
}

.container{
max-width:700px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
background:#2f66e0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Submitted Lost Items</h1>

<div id="lostList"></div>

<a href="dashboard321.html">
<button>Back to Dashboard</button>
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain: "intellifinds-19f97.firebaseapp.com",
projectId: "intellifinds-19f97",
storageBucket: "intellifinds-19f97.appspot.com",
messagingSenderId: "910756623728",
appId: "1:910756623728:web:8ab55db46a984c75860bb5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const lostRef = ref(db,"lostItems");

onValue(lostRef,(snapshot)=>{

const list=document.getElementById("lostList");
list.innerHTML="";

snapshot.forEach(child=>{

const data=child.val();

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<h3>Lost Item</h3>
<p><b>Item:</b> ${data.item}</p>
<p><b>Description:</b> ${data.description}</p>
<p><b>Location:</b> ${data.location}</p>
`;

list.appendChild(div);

});

});

</script>

</body>
</html>
