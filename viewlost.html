<!DOCTYPE html>
<html>
<head>
<title>View Lost Items</title>

<style>

body{
font-family:Arial;
background:#a9bdd6;
padding:40px;
}

h1{
text-align:center;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
background:white;
padding:20px;
width:250px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:8px;
}

.backbtn{
display:block;
width:200px;
margin:40px auto;
text-align:center;
padding:10px;
background:#2f66e0;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Submitted Lost Items</h1>

<div class="container" id="list"></div>

<a href="dashboard321.html" class="backbtn">Back to Dashboard</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain:"intellifinds-19f97.firebaseapp.com",
projectId:"intellifinds-19f97",
storageBucket:"intellifinds-19f97.appspot.com",
messagingSenderId:"910756623728",
appId:"1:910756623728:web:8ab55db46a984c75860bb5",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const container=document.getElementById("list");

onValue(ref(db,"lostItems"),(snapshot)=>{

container.innerHTML="";

snapshot.forEach(child=>{

const data=child.val();

const card=document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${data.photo||''}">

<p><b>Item:</b> ${data.item}</p>
<p><b>Description:</b> ${data.description}</p>
<p><b>Location:</b> ${data.location}</p>

<p><b>Status:</b> ${data.status||"Waiting for Police Verification"}</p>

<p><i>Contact details will be shared by police.</i></p>

`;

container.appendChild(card);

});

});

</script>

</body>
</html>
