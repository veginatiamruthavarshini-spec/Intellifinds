<!DOCTYPE html>
<html>
<head>

<title>Submitted Lost Items</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

</head>

<body>

<h2>Submitted Lost Items</h2>

<div id="lostItemsList"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
  authDomain: "intellifinds-19f97.firebaseapp.com",
  databaseURL: "https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "intellifinds-19f97",
  storageBucket: "intellifinds-19f97.appspot.com",
  messagingSenderId: "910756623728",
  appId: "1:910756623728:web:8ab55db46a984c75860bb5"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

db.ref("lostItems").on("value", function(snapshot){

let data = snapshot.val();
let html = "";

for(let id in data){

html += "<p><b>Item:</b> "+data[id].name+"<br>"+
"<b>Description:</b> "+data[id].description+"<br>"+
"<b>Location:</b> "+data[id].location+"</p><hr>";

}

document.getElementById("lostItemsList").innerHTML = html;

});

</script>

</body>
</html>
