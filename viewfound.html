<!DOCTYPE html>

<html>
<head>
<title>Found Items</title>

<style>
body{
font-family:Arial;
background:#8ea3bb;
text-align:center;
padding:40px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
width:260px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.back{
display:inline-block;
margin-top:30px;
padding:12px 20px;
background:#2f66e0;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>

</head>

<body>

<h1>Submitted Found Items</h1>

<div class="container" id="list"></div>

<a href="dashboard321.html" class="back">Back to Dashboard</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

onValue(ref(db,"foundItems"),(snap)=>{

let html="";

snap.forEach(c=>{
let d=c.val();

html += `
<div class="card">
<img src="${d.photo || ''}">
<p><b>Item:</b> ${d.item}</p>
<p><b>Description:</b> ${d.description}</p>
<p><b>Location:</b> ${d.location}</p>
<p><b>Status:</b> ${d.status}</p>
</div>
`;
  
});

document.getElementById("list").innerHTML = html;

});

</script>

</body>
</html>
