<!DOCTYPE html>
<html>
<head>
<title>Found Items</title>

<style>
body{
font-family:Arial;
background:#a9bdd6;
margin:0;
}

.container{
max-width:800px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="container">

<h1>Submitted Found Items</h1>

<div id="foundList"></div>

<a href="dashboard321.html">Back to Dashboard</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain:"intellifinds-19f97.firebaseapp.com",
projectId:"intellifinds-19f97",
storageBucket:"intellifinds-19f97.appspot.com",
messagingSenderId:"910756623728",
appId:"1:910756623728:web:8ab55db46a984c75860bb5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const foundRef = ref(db,"foundItems");

onValue(foundRef,(snapshot)=>{

const list = document.getElementById("foundList");
list.innerHTML = "";

snapshot.forEach(child=>{

const data = child.val();

const div = document.createElement("div");
div.className="card";

div.innerHTML = `
<h3>Found Item</h3>
<p><b>Item:</b> ${data.item}</p>
<p><b>Description:</b> ${data.description}</p>
<p><b>Location:</b> ${data.location}</p>
`;

list.appendChild(div);

});

});

</script>

</body>
</html>
