<!DOCTYPE html>

<html>
<head>
<title>Found Items</title>

<style>
body{font-family:Arial;background:#a9bdd6;padding:40px;}
.container{display:flex;flex-wrap:wrap;gap:20px;}
.card{background:white;padding:15px;border-radius:10px;width:250px;}
img{width:100%;height:150px;object-fit:cover;}
</style>

</head>

<body>

<h1>Found Items</h1>
<div class="container" id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);
const container = document.getElementById("list");

onValue(ref(db,"foundItems"), function(snapshot){

container.innerHTML = "";

if(!snapshot.exists()){
container.innerHTML = "<h3>No data</h3>";
return;
}

snapshot.forEach(function(child){

const data = child.val();

const card = document.createElement("div");
card.className = "card";

/* SIMPLE HTML (NO ERROR CHANCE) */
card.innerHTML =
"<img src='"+(data.photo || "")+"'>" +
"<p>Item: "+(data.item || "")+"</p>" +
"<p>Status: "+(data.status || "Waiting")+"</p>" +
"<p style='color:gray'>Details only visible to police</p>";

container.appendChild(card);

});

});

</script>

</body>
</html>
