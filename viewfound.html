<!DOCTYPE html>
<html>
<head>
<title>Found Items</title>

<style>
body{
font-family:Arial;
background:#a9bdd6;
padding:40px;
}

h2{
margin-bottom:25px;
}

.item{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

.back{
display:inline-block;
margin-top:20px;
padding:10px 18px;
background:#2f66e0;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<h2>Found Items</h2>
<div id="list"></div>

<a href="dashboard321.html" class="back">⬅ Back</a>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

onValue(ref(db,"foundItems"),(snap)=>{
let html="";

snap.forEach(c=>{
let d=c.val();

html += "<div class='item'>";
html += "<p><b>"+(d.item || "No Item")+"</b></p>";
html += "<p>Status: "+(d.status || "Waiting")+"</p>";
html += "</div>";
});

document.getElementById("list").innerHTML = html || "<p>No found items found</p>";
});
</script>

</body>
</html>
