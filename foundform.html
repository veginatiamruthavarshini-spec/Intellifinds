<!DOCTYPE html><html>
<head>
<title>Found Item</title>
<style>
body{font-family:Arial;background:#a9bdd6;text-align:center;padding-top:50px;}
input{display:block;margin:10px auto;padding:10px;width:250px;}
button{padding:10px 20px;background:#2f66e0;color:white;border:none;}
</style>
</head><body><h2>Report Found Item</h2><input id="item" placeholder="Item">
<input id="description" placeholder="Description">
<input id="location" placeholder="Location"><h3>Your Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="email" placeholder="Email"><button onclick="submitFound()">Submit</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

window.submitFound = function(){

push(ref(db,"foundItems"),{
item:document.getElementById("item").value,
description:document.getElementById("description").value,
location:document.getElementById("location").value,
name:document.getElementById("name").value,
phone:document.getElementById("phone").value,
email:document.getElementById("email").value,
status:"Waiting"
});

alert("Submitted");

}
</script></body>
</html>
