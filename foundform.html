<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Found Item - IntelliFind</title>
  <link rel="stylesheet" href="style.css">
  <style>
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }
    form {
      text-align: left;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Report Found Item</h2>
      <form>
        <input type="text" placeholder="Item Name" required>
        <textarea placeholder="Item Description" required></textarea>
        <input type="text" placeholder="Location Found" required>
        <input type="text" placeholder="Finder Address" required>
        <input type="tel" placeholder="Phone Number" required>
        <button type="submit">Submit</button>
      </form>
      <div class="buttons" style="margin-top:15px;">
        <a href="citizen.html" class="btn">Back</a>
      </div>
    </div>
  </div>
</body>
</html>
