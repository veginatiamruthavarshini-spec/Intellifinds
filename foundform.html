<!DOCTYPE html>
<html>

<head>

<title>Report Found Item</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

</head>

<body>

<div class="container">
<div class="card">

<h2>Report Found Item</h2>

<input type="text" id="itemname" placeholder="Item Name"><br><br>

<input type="text" id="description" placeholder="Item Description"><br><br>

<input type="text" id="location" placeholder="Location Found"><br><br>

<input type="file" id="photo"><br><br>

<button onclick="submitFound()" class="btn">Submit</button>

<br><br>

<a href="dashboard321.html" class="btn">Back to Dashboard</a>

</div>
</div>


<script>

const firebaseConfig = {
apiKey: "AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain: "intellifinds-19f97.firebaseapp.com",
databaseURL: "https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "intellifinds-19f97",
storageBucket: "intellifinds-19f97.appspot.com",
messagingSenderId: "910756623728",
appId: "1:910756623728:web:8ab55db46a984c75860bb5"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();


function similarity(str1,str2){

str1 = str1.toLowerCase();
str2 = str2.toLowerCase();

let words1 = str1.split(" ");
let words2 = str2.split(" ");

let match = 0;

for(let w1 of words1){
for(let w2 of words2){
if(w1 === w2){
match++;
}
}
}

return (match / Math.max(words1.length,words2.length))*100;

}



function submitFound(){

const name = document.getElementById("itemname").value;
const desc = document.getElementById("description").value;
const loc = document.getElementById("location").value;

const file = document.getElementById("photo").files[0];

const storageRef = storage.ref("foundPhotos/" + file.name);

storageRef.put(file).then(function(snapshot){

snapshot.ref.getDownloadURL().then(function(url){

const foundText = name + " " + desc;

db.ref("lostItems").once("value", function(snapshot){

let lostData = snapshot.val();

if(lostData){

for(let id in lostData){

let lostText = lostData[id].name + " " + lostData[id].description;

let score = similarity(foundText, lostText);

if(score >= 75){

alert("⚠ Possible match found with a lost item!");

}

}

}

});


db.ref("foundItems").push({

name: name,
description: desc,
location: loc,
image: url

});

alert("Found item submitted successfully");

window.location="viewfound.html";

});

});

}

</script>

</body>
</html>
