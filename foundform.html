<!DOCTYPE html>

<html>
<head>

<title>Report Found Item</title>

<style>

body{
font-family:Arial;
background:#a9bdd6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#2f66e0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

img{
width:100%;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Report Found Item</h2>

<input type="text" id="item" placeholder="Item Name">

<input type="text" id="description" placeholder="Description">

<input type="text" id="location" placeholder="Location Found">

<input type="file" id="photo" accept="image/*" capture="environment">

<img id="preview">

<button onclick="submitFound()">Submit</button>

<br><br>

<a href="dashboard321.html">Back to Dashboard</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain:"intellifinds-19f97.firebaseapp.com",
projectId:"intellifinds-19f97",
storageBucket:"intellifinds-19f97.appspot.com",
messagingSenderId:"910756623728",
appId:"1:910756623728:web:8ab55db46a984c75860bb5",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let imageData="";

document.getElementById("photo").addEventListener("change",function(){

const file=this.files[0];

const reader=new FileReader();

reader.onload=function(e){

imageData=e.target.result;

document.getElementById("preview").src=imageData;

}

reader.readAsDataURL(file);

});

window.submitFound=function(){

const item=document.getElementById("item").value;
const description=document.getElementById("description").value;
const location=document.getElementById("location").value;

push(ref(db,"foundItems"),{

item:item,
description:description,
location:location,
photo:imageData

});

alert("Found Item Submitted");

}

</script>

</body>
</html>
