<!DOCTYPE html>

<html>
<head>

<title>Report Found Item</title>

<style>

body{
font-family:Arial;
background:#a9bdd6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
padding:10px 20px;
background:#2f66e0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Report Found Item</h2>

<input type="text" id="item" placeholder="Item Name">
<input type="text" id="description" placeholder="Description">
<input type="text" id="location" placeholder="Location Found">

<input type="text" id="name" placeholder="Finder Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="email" placeholder="Email">

<input type="file" id="photo">

<button onclick="submitFound()">Submit</button>

<br><br> <a href="dashboard321.html">Back</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain:"intellifinds-19f97.firebaseapp.com",
projectId:"intellifinds-19f97",
storageBucket:"intellifinds-19f97.appspot.com",
messagingSenderId:"910756623728",
appId:"1:910756623728:web:8ab55db46a984c75860bb5",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

window.submitFound = async function(){

const item=document.getElementById("item").value;
const description=document.getElementById("description").value;
const location=document.getElementById("location").value;

const name=document.getElementById("name").value;
const phone=document.getElementById("phone").value;
const email=document.getElementById("email").value;

const file=document.getElementById("photo").files[0];

let photoURL="";

if(file){
const storageRef=sRef(storage,"foundImages/"+file.name);
await uploadBytes(storageRef,file);
photoURL=await getDownloadURL(storageRef);
}

push(ref(db,"foundItems"),{
item,
description,
location,
photo:photoURL,
name,
phone,
email,
status:"Waiting for Police Verification"
});

alert("Found Item Submitted Successfully");

}

</script>

</body>
</html>
