<!DOCTYPE html><html>
<head>
<title>Police Dashboard</title><style>
body{
font-family:Arial;
background:#8ea3bb;
text-align:center;
padding:40px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
width:300px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.verify{background:green;color:white;}
.reject{background:red;color:white;}

.back{
display:inline-block;
margin-top:30px;
padding:12px 20px;
background:#2f66e0;
color:white;
text-decoration:none;
border-radius:8px;
}

.status{
font-weight:bold;
margin-top:10px;
}
</style></head><body><h1>Police Dashboard</h1><div class="container" id="list"></div><a href="index.html" class="back">⬅ Back to Login</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

let foundItems=[];

/* STORE FOUND WITH ID */
onValue(ref(db,"foundItems"),(snap)=>{
foundItems=[];
snap.forEach(c=>{
foundItems.push({
id:c.key,
...c.val()
});
});
});

/* LOAD LOST */
onValue(ref(db,"lostItems"),(snap)=>{

let html="";

snap.forEach(c=>{

let lost=c.val();
let lostId=c.key;

foundItems.forEach(found=>{

/* MATCH CONDITION */
if(lost.item && found.item &&
lost.item.toLowerCase().trim() === found.item.toLowerCase().trim()){

html += `
<div class="card">

<p><b>Lost:</b> ${lost.item}</p>
<p>${lost.name} | ${lost.phone}</p>

<hr>

<p><b>Found:</b> ${found.item}</p>
<p>${found.name} | ${found.phone}</p>

<br>

${
lost.status==="Verified"
? `<p class="status" style="color:green;">✔ Verified</p>`
: lost.status==="Rejected"
? `<p class="status" style="color:red;">✖ Rejected</p>`
: `
<button class="verify" onclick="verify('${lostId}')">Verify</button>
<button class="reject" onclick="reject('${lostId}')">Reject</button>
`
}

</div>
`;

}

});

});

document.getElementById("list").innerHTML = html || "<p>No matches found</p>";

});

/* VERIFY */
window.verify=function(id){
update(ref(db,"lostItems/"+id),{
status:"Verified"
});
};

/* REJECT */
window.reject=function(id){
update(ref(db,"lostItems/"+id),{
status:"Rejected"
});
};

</script></body>
</html>
