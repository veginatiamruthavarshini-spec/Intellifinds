<!DOCTYPE html><html>
<body><h2>Police Dashboard</h2>
<div id="list"></div><a href="index.html">⬅ Back</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

let found=[];

onValue(ref(db,"foundItems"),(s)=>{
found=[];
s.forEach(c=>found.push(c.val()));
});

onValue(ref(db,"lostItems"),(snap)=>{

let html="";

snap.forEach(c=>{
let lost=c.val();
let id=c.key;

found.forEach(f=>{
if(lost.item && f.item && lost.item.toLowerCase()==f.item.toLowerCase()){

html += "<p><b>Lost:</b> "+lost.item+"</p>";
html += "<p>"+lost.name+" | "+lost.phone+" | "+lost.email+"</p>";

html += "<p><b>Found:</b> "+f.item+"</p>";
html += "<p>"+f.name+" | "+f.phone+" | "+f.email+"</p>";

html += "<button onclick=\"verify('"+id+"')\">Verify</button><hr>";
}
});
});

document.getElementById("list").innerHTML=html;
});

window.verify=function(id){
update(ref(db,"lostItems/"+id),{status:"Verified"});
alert("Verified");
}

</script></body>
</html>
