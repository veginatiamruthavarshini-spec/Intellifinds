<!DOCTYPE html>

<html>
<head>
<title>Police Dashboard</title>
<style>
body{font-family:Arial;background:#a9bdd6;padding:40px;}
.card{background:white;padding:20px;margin:10px;border-radius:10px;}
button{padding:8px;margin-top:10px;}
.reject{background:red;color:white;}
</style>
</head>

<body>

<h1>Police Dashboard</h1>
<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSy...",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);
const container=document.getElementById("list");

let foundItems=[];

onValue(ref(db,"foundItems"),(snap)=>{
foundItems=[];
snap.forEach(c=>foundItems.push(c.val()));
});

onValue(ref(db,"lostItems"),(snap)=>{

container.innerHTML="";

snap.forEach(child=>{

const lost=child.val();
const key=child.key;

foundItems.forEach(found=>{

if(lost.item && found.item &&
lost.item.toLowerCase().includes(found.item.toLowerCase())){

const div=document.createElement("div");
div.className="card";

div.innerHTML =

"<b>Lost:</b> "+lost.item+"<br>"+
"<b>Owner:</b> "+lost.name+"<br>"+
"<b>Phone:</b> "+lost.phone+"<br><br>"+

"<b>Found:</b> "+found.item+"<br>"+
"<b>Finder:</b> "+found.name+"<br>"+
"<b>Phone:</b> "+found.phone+"<br><br>"+

"<button onclick=\"verifyItem('"+key+"',this)\">Verify</button>"+
"<button class='reject' onclick=\"rejectItem('"+key+"')\">Reject</button>";

container.appendChild(div);

}

});

});

});

window.verifyItem=async function(id,btn){

await update(ref(db,"lostItems/"+id),{status:"Verified"});

btn.innerText="Verified";
btn.disabled=true;
btn.style.background="green";

btn.nextElementSibling.remove();

}

window.rejectItem=async function(id){
await update(ref(db,"lostItems/"+id),{status:"Rejected"});
}

</script>

</body>
</html>
