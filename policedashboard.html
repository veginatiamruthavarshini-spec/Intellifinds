<!DOCTYPE html>
<html>
<head>
<title>Police Dashboard</title>

<style>

body{
font-family:Arial;
background:#a9bdd6;
padding:40px;
}

h1{
text-align:center;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
margin-top:30px;
}

.card{
background:white;
padding:20px;
width:280px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:8px;
margin-bottom:10px;
}

button{
padding:8px 15px;
border:none;
background:#2f66e0;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.reject{
background:red;
}

</style>

</head>

<body>

<h1>Police Dashboard</h1>

<div class="container" id="matchList"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain:"intellifinds-19f97.firebaseapp.com",
projectId:"intellifinds-19f97",
storageBucket:"intellifinds-19f97.appspot.com",
messagingSenderId:"910756623728",
appId:"1:910756623728:web:8ab55db46a984c75860bb5",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const container=document.getElementById("matchList");

window.verifyItem = async function(id){
await update(ref(db,"lostItems/"+id),{status:"Verified by Police"});
alert("Item Verified");
}

window.rejectItem = async function(id){
await update(ref(db,"lostItems/"+id),{status:"Rejected"});
alert("Item Rejected");
}

let foundItems=[];

onValue(ref(db,"foundItems"),(snapshot)=>{
foundItems=[];
snapshot.forEach(child=>{
foundItems.push(child.val());
});
});

onValue(ref(db,"lostItems"),(snapshot)=>{

container.innerHTML="";

snapshot.forEach(child=>{

const lost=child.val();
const lostItem=(lost.item||"").toLowerCase();

foundItems.forEach(found=>{

const foundItem=(found.item||"").toLowerCase();

if(lostItem && foundItem && lostItem.includes(foundItem)){

const card=document.createElement("div");
card.className="card";

card.innerHTML=`

<img src="${lost.photo||''}">
<p><b>Lost Item:</b> ${lost.item}</p>

<p><b>Owner Name:</b> ${lost.name}</p>
<p><b>Owner Phone:</b> ${lost.phone}</p>
<p><b>Owner Email:</b> ${lost.email}</p>

<hr>

<img src="${found.photo||''}">
<p><b>Found Item:</b> ${found.item}</p>

<p><b>Finder Name:</b> ${found.name}</p>
<p><b>Finder Phone:</b> ${found.phone}</p>
<p><b>Finder Email:</b> ${found.email}</p>

<button onclick="verifyItem('${child.key}')">Verify</button>
<button class="reject" onclick="rejectItem('${child.key}')">Reject</button>

`;

container.appendChild(card);

}

});

});

});

</script>

</body>
</html>
