<!DOCTYPE html><html>
<head>
<title>Police Dashboard</title><style>
body{
font-family:Arial;
background:#8ea3bb;
text-align:center;
padding:40px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
width:300px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.back{
display:inline-block;
margin-top:30px;
padding:12px 20px;
background:#2f66e0;
color:white;
text-decoration:none;
border-radius:8px;
}

.match{
color:green;
font-weight:bold;
}
</style></head><body><h1>Police Dashboard</h1><div class="container" id="list"></div><a href="dashboard321.html" class="back">⬅ Back to Dashboard</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
});

const db = getDatabase(app);

let foundItems = [];

onValue(ref(db,"foundItems"),(snap)=>{
foundItems = [];
snap.forEach(c=>foundItems.push(c.val()));
});

onValue(ref(db,"lostItems"),(snap)=>{

let html="";

snap.forEach(c=>{
let lost = c.val();

foundItems.forEach(f=>{

if(lost.item && f.item && lost.item.toLowerCase() === f.item.toLowerCase()){

html += `
<div class="card">

<p class="match">MATCH FOUND</p>

<img src="${lost.photo || ''}">
<p><b>Lost Item:</b> ${lost.item}</p>
<p>${lost.description}</p>

<p><b>Owner:</b> ${lost.name}</p>
<p>${lost.phone} | ${lost.email}</p>

<hr>

<img src="${f.photo || ''}">
<p><b>Found Item:</b> ${f.item}</p>
<p>${f.description}</p>

<p><b>Finder:</b> ${f.name}</p>
<p>${f.phone} | ${f.email}</p>

</div>
`;

}

});

});

document.getElementById("list").innerHTML = html || "<p>No matches found</p>";

});

</script></body>
</html>
