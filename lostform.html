<!DOCTYPE html>

<html>
<head>
<title>Report Lost Item</title>

<style>
body{
font-family:Arial;
background:#a9bdd6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:white;
padding:30px;
border-radius:15px;
width:350px;
text-align:center;
}
input{
width:100%;
padding:10px;
margin:8px 0;
}
button{
padding:10px;
background:#2f66e0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h2>Report Lost Item</h2>

<input id="item" placeholder="Item Name">
<input id="description" placeholder="Description">
<input id="location" placeholder="Location">

<input id="name" placeholder="Owner Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">

<input type="file" id="photo" accept="image/*" capture="environment">

<button id="submitBtn" onclick="submitLost()">Submit</button>

<br><br><a href="index.html">⬅ Back</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let imageData = "";

document.getElementById("photo").addEventListener("change",(e)=>{
const file = e.target.files[0];
if(file){
const reader = new FileReader();
reader.onload = ()=> imageData = reader.result;
reader.readAsDataURL(file);
}
});

window.submitLost = async function(){

const btn = document.getElementById("submitBtn");

const itemVal = document.getElementById("item").value;
const descVal = document.getElementById("description").value;
const locVal = document.getElementById("location").value;
const nameVal = document.getElementById("name").value;
const phoneVal = document.getElementById("phone").value;
const emailVal = document.getElementById("email").value;

if(!itemVal || !descVal || !locVal || !nameVal || !phoneVal || !emailVal){
alert("Fill all fields");
return;
}

try{

btn.innerText="Submitting...";
btn.disabled=true;

await push(ref(db,"lostItems"),{
item:itemVal,
description:descVal,
location:locVal,
photo:imageData,
name:nameVal,
phone:phoneVal,
email:emailVal,
status:"Submitted"
});

btn.innerText="Submitted";
btn.style.background="green";

alert("Submitted Successfully");

}catch(err){
alert("Error: "+err.message);
btn.innerText="Submit";
btn.disabled=false;
}

}

</script>

</body>
</html>
