<!DOCTYPE html>
<html>
<head>
  <title>Lost Item</title>
</head>
<body>

<h2>Report Lost Item</h2>

<input id="title" placeholder="Item Name"><br><br>
<input id="desc" placeholder="Description"><br><br>
<input id="loc" placeholder="Location"><br><br>

<h3>Your Details</h3>
<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="address" placeholder="Address"><br><br>

<button onclick="submitLost()">Submit</button>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.submitLost = async function () {
  await addDoc(collection(db, "lostItems"), {
    title: document.getElementById("title").value,
    description: document.getElementById("desc").value,
    location: document.getElementById("loc").value,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    isVerified: false
  });

  alert("Lost item submitted!");
};
</script>

</body>
</html>
