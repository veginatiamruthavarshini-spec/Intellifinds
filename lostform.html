<!DOCTYPE html>
<html>

<head>

<title>Report Lost Item</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

</head>

<body>

<div class="container">
<div class="card">

<h2>Report Lost Item</h2>

<input type="text" id="itemname" placeholder="Item Name"><br><br>

<input type="text" id="description" placeholder="Item Description"><br><br>

<input type="text" id="location" placeholder="Location Lost"><br><br>

<input type="file" id="photo"><br><br>

<button onclick="submitLost()" class="btn">Submit</button>

</div>
</div>


<script>

const firebaseConfig = {
apiKey: "AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain: "intellifinds-19f97.firebaseapp.com",
databaseURL: "https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "intellifinds-19f97",
storageBucket: "intellifinds-19f97.appspot.com",
messagingSenderId: "910756623728",
appId: "1:910756623728:web:8ab55db46a984c75860bb5"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const storage = firebase.storage();


function submitLost(){

const name = document.getElementById("itemname").value;
const desc = document.getElementById("description").value;
const loc = document.getElementById("location").value;

const file = document.getElementById("photo").files[0];

const storageRef = storage.ref("lostPhotos/" + file.name);

storageRef.put(file).then(function(snapshot){

snapshot.ref.getDownloadURL().then(function(url){

db.ref("lostItems").push({

name: name,
description: desc,
location: loc,
image: url

});

alert("Lost item submitted successfully");

window.location="viewlost.html";

});

});

}

</script>

</body>
</html>
