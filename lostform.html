<!DOCTYPE html>
<html>
<head>
<title>Report Lost Item</title>

<style>

body{
font-family:Arial;
background:#a9bdd6;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:#2f66e0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Report Lost Item</h2>

<input type="text" id="item" placeholder="Item Name">

<input type="text" id="description" placeholder="Description">

<input type="text" id="location" placeholder="Location Lost">

<button onclick="submitLost()">Submit</button>

<br><br>

<a href="dashboard321.html">Back to Dashboard</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain: "intellifinds-19f97.firebaseapp.com",
projectId: "intellifinds-19f97",
storageBucket: "intellifinds-19f97.appspot.com",
messagingSenderId: "910756623728",
appId: "1:910756623728:web:8ab55db46a984c75860bb5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.submitLost = function(){

const item=document.getElementById("item").value;
const description=document.getElementById("description").value;
const location=document.getElementById("location").value;

push(ref(db,"lostItems"),{
item:item,
description:description,
location:location
});

alert("Lost Item Submitted");

}

</script>

</body>
</html>
