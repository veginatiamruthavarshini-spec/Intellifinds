<!DOCTYPE html>

<html>
<head>

<title>AI Match Results</title>

<style>

body{
font-family:Arial;
background:#a9bdd6;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
}

.card{
background:white;
padding:20px;
width:300px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.backbtn{
display:block;
width:220px;
margin:40px auto;
text-align:center;
padding:12px;
background:#2f66e0;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<h1>AI Match Results</h1>

<div class="container" id="matchList"></div>

<a href="dashboard321.html" class="backbtn">Back to Dashboard</a>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain:"intellifinds-19f97.firebaseapp.com",
projectId:"intellifinds-19f97",
storageBucket:"intellifinds-19f97.appspot.com",
messagingSenderId:"910756623728",
appId:"1:910756623728:web:8ab55db46a984c75860bb5",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container=document.getElementById("matchList");

let foundItems=[];

onValue(ref(db,"foundItems"),(snapshot)=>{

foundItems=[];

snapshot.forEach(child=>{
foundItems.push(child.val());
});

});

onValue(ref(db,"lostItems"),(snapshot)=>{

container.innerHTML="";

snapshot.forEach(child=>{

const lost=child.val();

foundItems.forEach(found=>{

if(!lost.item || !found.item) return;

const lostItem=lost.item.toLowerCase();
const foundItem=found.item.toLowerCase();

if(lostItem.includes(foundItem) || foundItem.includes(lostItem)){

const card=document.createElement("div");
card.className="card";

card.innerHTML=`

<h3>Match Found</h3>

<img src="${lost.photo || ''}">

<p><b>Lost Item:</b> ${lost.item}</p>
<p><b>Description:</b> ${lost.description}</p>
<p><b>Location:</b> ${lost.location}</p>

<hr>

<img src="${found.photo || ''}">

<p><b>Found Item:</b> ${found.item}</p>
<p><b>Description:</b> ${found.description}</p>
<p><b>Location:</b> ${found.location}</p>

<p><b>Status:</b> Waiting for Police Verification</p>

`;

container.appendChild(card);

}

});

});

});

</script>

</body>
</html>
