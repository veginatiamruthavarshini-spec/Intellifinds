<!DOCTYPE html>
<html>

<head>

<title>Possible Matches</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

</head>

<body>

<h2 style="text-align:center;">Possible Lost-Found Matches</h2>

<div id="matchList"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain: "intellifinds-19f97.firebaseapp.com",
databaseURL: "https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "intellifinds-19f97",
storageBucket: "intellifinds-19f97.appspot.com",
messagingSenderId: "910756623728",
appId: "1:910756623728:web:8ab55db46a984c75860bb5"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();


function similarity(str1,str2){

str1 = str1.toLowerCase();
str2 = str2.toLowerCase();

let words1 = str1.split(" ");
let words2 = str2.split(" ");

let match = 0;

for(let w1 of words1){
for(let w2 of words2){
if(w1 === w2){
match++;
}
}
}

return (match / Math.max(words1.length,words2.length))*100;

}


db.ref("lostItems").once("value", function(lostSnapshot){

db.ref("foundItems").once("value", function(foundSnapshot){

let lost = lostSnapshot.val();
let found = foundSnapshot.val();

let html = "";

for(let l in lost){

for(let f in found){

let lostText = lost[l].name + " " + lost[l].description;
let foundText = found[f].name + " " + found[f].description;

let score = similarity(lostText,foundText);

if(score >= 50){

html += `

<div class="card" style="width:350px;margin:20px auto;text-align:left;">

<h3>Possible Match</h3>

<p><b>Lost Item:</b> ${lost[l].name}</p>
<p><b>Lost Description:</b> ${lost[l].description}</p>

<p><b>Found Item:</b> ${found[f].name}</p>
<p><b>Found Description:</b> ${found[f].description}</p>

<p><b>Match Score:</b> ${score.toFixed(0)}%</p>

<hr>

</div>

`;

}

}

}

document.getElementById("matchList").innerHTML = html;

});

});

</script>

</body>
</html>
