<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain:"intellifinds-19f97.firebaseapp.com",
projectId:"intellifinds-19f97",
storageBucket:"intellifinds-19f97.appspot.com",
messagingSenderId:"910756623728",
appId:"1:910756623728:web:8ab55db46a984c75860bb5",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("matchList");

function normalize(text){
return text.toLowerCase().trim();
}

function calculateMatch(lost,found){

let score = 0;

if(normalize(lost.item) === normalize(found.item))
score += 60;

if(normalize(lost.description).includes(normalize(found.description)) ||
normalize(found.description).includes(normalize(lost.description)))
score += 30;

if(normalize(lost.location) === normalize(found.location))
score += 10;

return score;
}

async function findMatches(){

const lostSnap = await get(ref(db,"lostItems"));
const foundSnap = await get(ref(db,"foundItems"));

const lostItems = [];
const foundItems = [];

lostSnap.forEach(child => lostItems.push(child.val()));
foundSnap.forEach(child => foundItems.push(child.val()));

lostItems.forEach(lost => {

foundItems.forEach(found => {

const score = calculateMatch(lost,found);

if(score >= 50){

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h3>Possible Match</h3>

<img src="${lost.photo || ''}">
<p><b>Lost Item:</b> ${lost.item}</p>

<img src="${found.photo || ''}">
<p><b>Found Item:</b> ${found.item}</p>

<p><b>Location:</b> ${lost.location}</p>

<h3 style="color:#2f66e0;">Match Score: ${score}%</h3>
`;

container.appendChild(card);

}

});

});

}

findMatches();

</script>
