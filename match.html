<!DOCTYPE html>
<html>
<head>

<title>AI Match Results</title>

<style>

body{
font-family: Arial;
background:#a9bdd6;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
margin:20px 0;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
background:#2f66e0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Matching Results</h1>

<div id="matchList"></div>

<br>

<a href="dashboard321.html">
<button>Back to Dashboard</button>
</a>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain: "intellifinds-19f97.firebaseapp.com",
projectId: "intellifinds-19f97",
storageBucket: "intellifinds-19f97.appspot.com",
messagingSenderId: "910756623728",
appId: "1:910756623728:web:8ab55db46a984c75860bb5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const matchList = document.getElementById("matchList");

async function findMatches(){

const lostSnapshot = await get(ref(db,"lostItems"));
const foundSnapshot = await get(ref(db,"foundItems"));

const lostItems = [];
const foundItems = [];

lostSnapshot.forEach(child=>{
lostItems.push(child.val());
});

foundSnapshot.forEach(child=>{
foundItems.push(child.val());
});

lostItems.forEach(lost => {

foundItems.forEach(found => {

let score = 0;

if(lost.item.toLowerCase() === found.item.toLowerCase())
score += 60;

if(lost.description.toLowerCase() === found.description.toLowerCase())
score += 30;

if(lost.location.toLowerCase() === found.location.toLowerCase())
score += 10;

if(score >= 60){

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<h3>Match Found</h3>

<p><b>Lost Item:</b> ${lost.item}</p>
<p><b>Found Item:</b> ${found.item}</p>

<p><b>Lost Description:</b> ${lost.description}</p>
<p><b>Found Description:</b> ${found.description}</p>

<p><b>Location:</b> ${lost.location}</p>

<h3>Match Score: ${score}%</h3>
`;

matchList.appendChild(div);

}

});

});

}

findMatches();

</script>

</body>
</html>
