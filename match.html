<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDb-C5-Mk2GVlsfFNJJKcCA1GoSI1mC_LI",
authDomain:"intellifinds-19f97.firebaseapp.com",
projectId:"intellifinds-19f97",
storageBucket:"intellifinds-19f97.appspot.com",
messagingSenderId:"910756623728",
appId:"1:910756623728:web:8ab55db46a984c75860bb5",
databaseURL:"https://intellifinds-19f97-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("matchList");

async function findMatches(){

const lostSnap = await get(ref(db,"lostItems"));
const foundSnap = await get(ref(db,"foundItems"));

lostSnap.forEach(lostChild => {

const lost = lostChild.val();

foundSnap.forEach(foundChild => {

const found = foundChild.val();

let match = false;

const lostItem = lost.item.toLowerCase();
const foundItem = found.item.toLowerCase();

const lostDesc = lost.description.toLowerCase();
const foundDesc = found.description.toLowerCase();

if(lostItem === foundItem)
match = true;

if(foundDesc.includes(lostItem) || lostDesc.includes(foundItem))
match = true;

if(match){

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h3>Match Found</h3>

<img src="${lost.photo || ''}">
<p><b>Lost Item:</b> ${lost.item}</p>

<img src="${found.photo || ''}">
<p><b>Found Item:</b> ${found.item}</p>

<p><b>Lost Location:</b> ${lost.location}</p>
<p><b>Found Location:</b> ${found.location}</p>
`;

container.appendChild(card);

}

});

});

}

findMatches();

</script>
