<!DOCTYPE html>
<html>

<head>

<title>Citizen Login</title>

<style>

body{
font-family: Arial, sans-serif;
background:#a9bdd6;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
display:flex;
justify-content:center;
align-items:center;
width:100%;
}

.card{
background:#f2f2f2;
padding:40px;
border-radius:20px;
width:350px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
}

.btn{
display:block;
width:100%;
padding:12px;
margin-top:15px;
background:#2f66e0;
color:white;
text-decoration:none;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
background:#1d4ed8;
}

.home{
display:block;
margin-top:20px;
color:#2f66e0;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Citizen Login</h2>

<input type="email" id="email" placeholder="Enter Email">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="register()" class="btn">Register</button>

<button onclick="login()" class="btn">Login</button>

<a href="index.html" class="home">Back to Home</a>

</div>

</div>

</body>

</html>
