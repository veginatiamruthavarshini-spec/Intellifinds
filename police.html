<!DOCTYPE html>
<html>
<head>
  <title>Police Login</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#a9bdd6;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:12px;
      width:340px;
      text-align:center;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
      box-sizing:border-box;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      width:100%;
      padding:10px;
      background:#2f66e0;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      margin-top:10px;
      font-weight:bold;
    }

    button:hover{
      background:#1d4ed8;
    }

    .back{
      display:block;
      margin-top:15px;
      text-decoration:none;
      color:#2f66e0;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Police Login</h2>

    <input type="text" id="policeId" placeholder="Enter Police ID">
    <input type="password" id="policePassword" placeholder="Enter Password">

    <button onclick="loginPolice()">Login</button>

    <a href="index.html" class="back">Back to Home</a>
  </div>

  <script>
    function loginPolice() {
      const policeId = document.getElementById("policeId").value.trim();
      const policePassword = document.getElementById("policePassword").value.trim();

      const correctPoliceId = "CMRPOLICE01";
      const correctPassword = "police123";

      if (policeId === correctPoliceId && policePassword === correctPassword) {
        alert("Police Login Successful");
        window.location.href = "policedashboard.html";
      } else {
        alert("Invalid Police ID or Password");
      }
    }
  </script>

</body>
</html>
