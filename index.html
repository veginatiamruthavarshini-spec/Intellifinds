<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IntelliFind</title>

<style>

body{
font-family: Arial, sans-serif;
background:#a9bdd6;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
display:flex;
justify-content:center;
align-items:center;
width:100%;
}

.card{
background:#f2f2f2;
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.subtitle{
color:#444;
margin-bottom:25px;
}

.role-buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.btn{
padding:12px 20px;
background:#2f66e0;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#1d4ed8;
transform:scale(1.05);
}

.police{
background:#e53935;
}

.police:hover{
background:#c62828;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>IntelliFind</h1>
<p class="subtitle">Smart Lost and Found System</p>

<h2>Welcome</h2>
<p>Select your role to continue</p>

<div class="role-buttons">

<a href="citizen.html" class="btn">Citizen Login</a>

<a href="police.html" class="btn police">Police Login</a>

</div>

</div>

</div>

</body>
</html>
